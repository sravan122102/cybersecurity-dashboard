<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <div id="login-view" class="view active">
        <div class="login-card">
            <h1>CyberSec System</h1>
            <p>Enter your credentials to access the dashboard</p>
            <input type="text" id="username" placeholder="Username" />
            <input type="password" id="password" placeholder="Password" />
            <button id="login-btn">Login</button>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="dashboard-view" class="view">
        <nav class="sidebar">
            <div class="logo">CyberSec</div>
            <ul id="sidebar-nav">
                <li class="active" data-view="dashboard-content">Dashboard</li>
            </ul>
            <div class="user-info">
                <span id="user-role"></span>
                <button id="logout-btn">Logout</button>
            </div>
        </nav>
        
        <main class="content">
            <header>
                <h2>Security Operations Center</h2>
                <div class="header-controls">

                    <div class="notification-icon" id="notif-bell">
                        🔔<span class="badge" id="notif-badge" style="display: none;">0</span>
                        <div class="notif-dropdown" id="notif-dropdown">
                            <h4>Recent Alerts</h4>
                            <div id="notif-list">
                                <div class="notif-item">No active alerts</div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div id="dashboard-content" class="page-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3 style="font-size: 1.5rem; color: var(--text-primary);">Infrastructure Monitoring</h3>
                    <button id="simulate-attack-btn" style="width: auto; padding: 12px 25px; background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);">Simulate Attack</button>
                </div>
                <section class="company-cards" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 35px; min-height: 250px;">
                    <div class="card company-card" id="company-Alpha" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <h3 style="font-size: 1.8rem; margin-bottom: 20px; color: white;">Company Alpha</h3>
                        <div class="status-indicator">
                            <span class="value status-badge status-Secure" id="status-Alpha">Secure</span>
                        </div>
                    </div>
                    <div class="card company-card" id="company-Beta" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <h3 style="font-size: 1.8rem; margin-bottom: 20px; color: white;">Company Beta</h3>
                        <div class="status-indicator">
                            <span class="value status-badge status-Secure" id="status-Beta">Secure</span>
                        </div>
                    </div>
                    <div class="card company-card" id="company-Gamma" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <h3 style="font-size: 1.8rem; margin-bottom: 20px; color: white;">Company Gamma</h3>
                        <div class="status-indicator">
                            <span class="value status-badge status-Secure" id="status-Gamma">Secure</span>
                        </div>
                    </div>
                </section>
            </div>
            

        </main>
        
        <div id="alert-toast-container"></div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
